<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

.bg{
position:fixed;
inset:0;
overflow:hidden;
z-index:-1;
}

.bg span{
position:absolute;
bottom:-150px;
width:30px;
height:30px;
background:#FFD700;
border-radius:50%;
box-shadow:
0 0 10px #FFD700,
0 0 30px #FFD700,
0 0 80px #FFD700;
animation:floatUp linear infinite;
opacity:.7;
}

.bg span:nth-child(1){left:5%;animation-duration:20s;}
.bg span:nth-child(2){left:15%;animation-duration:15s;}
.bg span:nth-child(3){left:25%;animation-duration:18s;}
.bg span:nth-child(4){left:35%;animation-duration:22s;}
.bg span:nth-child(5){left:45%;animation-duration:17s;}
.bg span:nth-child(6){left:55%;animation-duration:25s;}
.bg span:nth-child(7){left:65%;animation-duration:14s;}
.bg span:nth-child(8){left:75%;animation-duration:19s;}
.bg span:nth-child(9){left:85%;animation-duration:23s;}
.bg span:nth-child(10){left:95%;animation-duration:16s;}

@keyframes floatUp{
0%{
transform:translateY(0) scale(0);
}
100%{
transform:translateY(-120vh) scale(1.5);
}
}

.container{
max-width:550px;
margin:auto;
padding:30px 20px;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:100%;
text-align:center;
}

.logo{
font-size:60px;
font-weight:800;
color:#FFD700;
text-shadow:
0 0 15px #FFD700,
0 0 40px #FFD700;
margin-bottom:15px;
animation:pulse 3s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.03);
}
}

.subtitle{
color:#ccc;
margin-bottom:25px;
font-size:14px;
}

.banner{
width:100%;
border-radius:20px;
overflow:hidden;
margin-bottom:25px;
border:2px solid rgba(255,215,0,.4);
box-shadow:
0 0 30px rgba(255,215,0,.25);
}

.banner img{
display:block;
width:100%;
}

.btn{
display:block;
width:100%;
padding:16px;
margin:12px 0;
text-decoration:none;
font-weight:700;
border-radius:14px;
transition:.3s;
letter-spacing:.5px;
}

.btn-primary{
background:linear-gradient(135deg,#FFD700,#ffef8a);
color:#000;
box-shadow:0 0 20px rgba(255,215,0,.5);
}

.btn-primary:hover{
transform:translateY(-3px);
box-shadow:0 0 35px rgba(255,215,0,.8);
}

.btn-secondary{
background:#111;
border:1px solid #FFD700;
color:#FFD700;
}

.btn-secondary:hover{
background:#FFD700;
color:#000;
}

.footer{
margin-top:25px;
font-size:12px;
color:#999;
}

</style>
</head>
